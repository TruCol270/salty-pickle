steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/salty-pickle-api:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/salty-pickle-api:latest'
      - './'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/salty-pickle-frontend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/salty-pickle-frontend:latest'
      - './frontend'

  - name: 'gcr.io/cloud-builders/docker'
    id: verify-api-image-size
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        SIZE=$(docker image inspect gcr.io/$PROJECT_ID/salty-pickle-api:$COMMIT_SHA --format='{{.Size}}')
        SIZE_MB=$((SIZE / 1024 / 1024))
        echo "API image size: $${SIZE_MB}MB"
        if [ "$$SIZE_MB" -gt 500 ]; then
          echo "ERROR: API image exceeds 500MB limit"
          exit 1
        fi

  - name: 'gcr.io/cloud-builders/docker'
    id: verify-frontend-image-size
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        SIZE=$(docker image inspect gcr.io/$PROJECT_ID/salty-pickle-frontend:$COMMIT_SHA --format='{{.Size}}')
        SIZE_MB=$((SIZE / 1024 / 1024))
        echo "Frontend image size: $${SIZE_MB}MB"
        if [ "$$SIZE_MB" -gt 100 ]; then
          echo "ERROR: Frontend image exceeds 100MB limit"
          exit 1
        fi

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/salty-pickle-api:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/salty-pickle-api:latest'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/salty-pickle-frontend:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/salty-pickle-frontend:latest'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'salty-pickle-api'
      - '--image'
      - 'gcr.io/$PROJECT_ID/salty-pickle-api:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'salty-pickle-frontend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/salty-pickle-frontend:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '256Mi'

images:
  - 'gcr.io/$PROJECT_ID/salty-pickle-api:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/salty-pickle-api:latest'
  - 'gcr.io/$PROJECT_ID/salty-pickle-frontend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/salty-pickle-frontend:latest'
