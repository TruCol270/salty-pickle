# Config-as-code when the Railway service uses the repo root as its source directory.
# If you instead set Root Directory to `.worktrees/mvp`, Railway will use that folder's railway.toml + Dockerfile.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"
healthcheckPath = "/live"
healthcheckTimeout = 10
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[deploy.releaseCommand]
command = "alembic upgrade head"
