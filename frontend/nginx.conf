server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        resolver 127.0.0.11 valid=10s;
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_connect_timeout 5s;
    }

    location /auth {
        resolver 127.0.0.11 valid=10s;
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_connect_timeout 5s;
    }
}
