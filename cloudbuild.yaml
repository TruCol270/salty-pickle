steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/salty-pickle-api:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/salty-pickle-api:latest'
      - './'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/salty-pickle-frontend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/salty-pickle-frontend:latest'
      - './frontend'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/salty-pickle-api:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/salty-pickle-api:latest'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/salty-pickle-frontend:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/salty-pickle-frontend:latest'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'salty-pickle-api'
      - '--image'
      - 'gcr.io/$PROJECT_ID/salty-pickle-api:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'salty-pickle-frontend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/salty-pickle-frontend:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '256Mi'

images:
  - 'gcr.io/$PROJECT_ID/salty-pickle-api:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/salty-pickle-api:latest'
  - 'gcr.io/$PROJECT_ID/salty-pickle-frontend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/salty-pickle-frontend:latest'
